<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#eef3f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial,sans-serif;
}

.login-box{
background:white;
padding:35px;
width:350px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.login-box h2{
text-align:center;
color:#003366;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#00a86b;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#008f5a;
}

#error{
margin-top:15px;
color:red;
text-align:center;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<div id="error"></div>

</div>

<script type="module" src="admin-login.js"></script>

</body>
  </html>
