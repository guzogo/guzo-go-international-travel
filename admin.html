<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Guzo Go International Travel</title>
<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="sidebar">

<h2>🌍 Guzo Go</h2>

<a href="#">🏠 Dashboard</a>

<a href="#">📄 Applications</a>

<a href="#">✅ Approved</a>

<a href="#">⏳ Pending</a>

<a href="#">❌ Rejected</a>

<a href="#">👥 Applicants</a>

<a href="#">⚙ Settings</a>

</div>

<div class="main">

<div class="topbar">

<h1>Admin Dashboard</h1>

<button id="logoutBtn">Logout</button>

</div>

<div class="cards">

<div class="card">

<h2 id="totalApps">0</h2>

<p>Total Applications</p>

</div>

<div class="card">

<h2 id="approvedApps">0</h2>

<p>Approved</p>

</div>

<div class="card">

<h2 id="pendingApps">0</h2>

<p>Pending</p>

</div>

<div class="card">

<h2 id="rejectedApps">0</h2>

<p>Rejected</p>

</div>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="🔍 Search by Applicant ID or Name">

  </div>
<table>

<thead>

<tr>

<th>Applicant ID</th>

<th>Full Name</th>

<th>Country</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="applicationsTable">

</tbody>

</table>

<!-- View Details Modal -->

<div id="detailsModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<h2>Applicant Details</h2>

<div id="detailsContent"></div>

</div>

  </div>
  <footer>

<p>© 2026 Guzo Go International Travel & Visa Consultancy</p>

</footer>

</div>

<script type="module" src="admin.js"></script>
</body>

  </html>
