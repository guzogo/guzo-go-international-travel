<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | Guzo Go International Travel</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#eef3f9;
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:#003366;
color:white;
padding:20px;
position:fixed;
top:0;
left:0;
bottom:0;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin-bottom:8px;
border-radius:8px;
}

.sidebar a:hover{
background:#00509e;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.topbar{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
margin-bottom:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h2{
font-size:35px;
color:#00a86b;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

th{
background:#003366;
color:white;
padding:15px;
}

td{
padding:15px;
text-align:center;
border-bottom:1px solid #eee;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.approve{
background:#28a745;
}

.reject{
background:#dc3545;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🌍 Guzo Go</h2>

<a href="#">Dashboard</a>

<a href="#">Applications</a>

</div>

<div class="main">

<div class="topbar" style="display:flex;justify-content:space-between;align-items:center;">

<h1>Admin Dashboard</h1>

<button id="logoutBtn"
style="background:#dc3545;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">

Logout

</button>

</div>

<div class="cards">

<div class="card">

<h2 id="totalApps">0</h2>

<p>Total</p>

</div>

<div class="card">

<h2 id="approvedApps">0</h2>

<p>Approved</p>

</div>

<div class="card">

<h2 id="pendingApps">0</h2>

<p>Pending</p>

</div>

<div class="card">

<h2 id="rejectedApps">0</h2>

<p>Rejected</p>

</div>

</div>

<table>

<thead>

<tr>

<th>Applicant ID</th>

<th>Name</th>

<th>Country</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="applicationsTable">

</tbody>

</table>

</div>

<script type="module" src="admin.js"></script>

</body>

  </html>
