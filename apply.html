<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply | Guzo Go International Travel & Visa Consultancy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin-bottom:10px;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:bold;
}

.hero{
background:linear-gradient(rgba(0,51,102,.8),rgba(0,51,102,.8));
padding:60px 20px;
text-align:center;
color:white;
}

.hero h2{
font-size:36px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.container h2{
text-align:center;
color:#003366;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
resize:vertical;
min-height:100px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:768px){
.row{
grid-template-columns:1fr;
}
}

button{
width:100%;
padding:16px;
background:#00a86b;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00895a;
}

</style>

</head>

<body>

<header>

<h1>Guzo Go International Travel & Visa Consultancy</h1>

<nav>

<a href="index.html">Home</a>

<a href="apply.html">Apply</a>

<a href="verify.html">Verify</a>

<a href="contact.html">Contact</a>

</nav>

</header>

<section class="hero">

<h2>Online Visa Application</h2>

<p>
Complete the form below carefully. Your application will be reviewed by our team.
</p>

</section>

<div class="container">

<h2>Application Form</h2>

<form id="applicationForm">
  <div class="row">

<div class="form-group">
<label>Full Name *</label>
<input
type="text"
id="fullName"
placeholder="Enter your full name"
required>
</div>

<div class="form-group">
<label>Phone Number *</label>
<input
type="tel"
id="phone"
placeholder="+2519XXXXXXXX"
required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Email Address *</label>
<input
type="email"
id="email"
placeholder="example@email.com"
required>
</div>

<div class="form-group">
<label>Passport Number *</label>
<input
type="text"
id="passport"
placeholder="Passport Number"
required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Destination Country *</label>

<select id="country" required>

<option value="">Select Country</option>

<option>🇨🇦 Canada</option>

<option>🇸🇦 Saudi Arabia</option>

<option>🇰🇼 Kuwait</option>

<option>🇦🇪 Dubai (UAE)</option>

</select>

</div>

<div class="form-group">
<label>Date of Birth *</label>

<input
type="date"
id="dob"
required>

</div>

  </div>
  <div class="row">

<div class="form-group">
<label>Gender *</label>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

</div>

<div class="form-group">
<label>Occupation *</label>

<input
type="text"
id="occupation"
placeholder="Your Occupation"
required>

</div>

</div>

<div class="form-group">

<label>Current Address *</label>

<textarea
id="address"
placeholder="Enter your full address"
required></textarea>

</div>

<div class="form-group">

<label>Upload Passport Copy</label>

<input
type="file"
id="passportFile"
accept=".jpg,.jpeg,.png,.pdf">

</div>

<div class="form-group">

<label>Additional Notes</label>

<textarea
id="notes"
placeholder="Write any additional information (optional)"></textarea>

</div>

<div id="message" style="margin:20px 0;"></div>

<button type="submit">

Submit Application

  </button>
  </form>

</div>

<footer style="background:#003366;color:white;text-align:center;padding:20px;margin-top:40px;">
© 2026 Guzo Go International Travel & Visa Consultancy
</footer>

<script type="module">

import { saveApplication } from "./firebase.js";

const form = document.getElementById("applicationForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const data = {

fullName: document.getElementById("fullName").value,

phone: document.getElementById("phone").value,

email: document.getElementById("email").value,

passport: document.getElementById("passport").value,

country: document.getElementById("country").value,

dob: document.getElementById("dob").value,

gender: document.getElementById("gender").value,

occupation: document.getElementById("occupation").value,

address: document.getElementById("address").value,

notes: document.getElementById("notes").value

};

const result = await saveApplication(data);

if(result.success){

message.innerHTML = `
<div style="background:#d4edda;padding:20px;border-radius:10px;color:#155724;">
<h3>✅ Application Submitted Successfully!</h3>
<p><strong>Applicant ID:</strong> ${result.applicantId}</p>
<p>Please save your Applicant ID for verification.</p>
</div>
`;

form.reset();

}else{

message.innerHTML = `
<div style="background:#f8d7da;padding:20px;border-radius:10px;color:#721c24;">
❌ Failed to submit application.<br>
${result.message}
</div>
`;

}

});

</script>

</body>

  </html>
