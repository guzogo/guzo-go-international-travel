<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apply | Guzo Go International Travel & Visa Consultancy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

header h1{
margin-bottom:10px;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:bold;
}

.hero{
background:linear-gradient(rgba(0,51,102,.8),rgba(0,51,102,.8));
padding:60px 20px;
text-align:center;
color:white;
}

.hero h2{
font-size:36px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.container h2{
text-align:center;
color:#003366;
margin-bottom:30px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
resize:vertical;
min-height:100px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:768px){
.row{
grid-template-columns:1fr;
}
}

button{
width:100%;
padding:16px;
background:#00a86b;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00895a;
}

</style>

</head>

<body>
<div style="text-align:right;padding:10px 20px;background:#f4f7fb;">
<button onclick="setLanguage('en')">🇬🇧 English</button>
<button onclick="setLanguage('am')">🇪🇹 አማርኛ</button>
  </div>
<header>

<h1>Guzo Go International Travel & Visa Consultancy</h1>

<nav>

<a href="index.html">Home</a>

<a href="apply.html">Apply</a>

<a href="verify.html">Verify</a>

<a href="contact.html">Contact</a>

</nav>

</header>

<section class="hero">

<h2>Online Visa Application</h2>

<p>
Complete the form below carefully. Your application will be reviewed by our team.
</p>

</section>

<div class="container">

<h2>Application Form</h2>

<form id="applicationForm">
  <div class="row">

<div class="form-group">
<label>Full Name *</label>
<input
type="text"
id="fullName"
placeholder="Enter your full name"
required>
</div>

<div class="form-group">
<label>Phone Number *</label>
<input
type="tel"
id="phone"
placeholder="+2519XXXXXXXX"
required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Email Address *</label>
<input
type="email"
id="email"
placeholder="example@email.com"
required>
</div>

<div class="form-group">
<label>Passport Number *</label>
<input
type="text"
id="passport"
placeholder="Passport Number"
required>
</div>

</div>
<label for="service">Service Type</label>

<select id="service" name="service" required>
    <option value="">Select Service</option>

    <option value="process">Process</option>

    <option value="passport">Passport</option>

    <option value="idcard">ID Card</option>

    <option value="visa">Visa</option>
</select>

<div id="passportType" style="display:none; margin-top:15px;">

<label>Passport Type</label>

<select id="passportOption">

<option value="">Select Passport Type</option>

<option value="regular">Regular</option>

<option value="urgent">Urgent</option>

</select>

</div>

<div class="row">

<div class="form-group">
<label>Destination Country *</label>

<select id="country" required>

<option value="">Select Country</option>

<option>🇨🇦 Canada</option>
  
<option>🇸🇦 Saudi Arabia</option>

<option>🇰🇼 Kuwait</option>

<option>🇦🇪 Dubai (UAE)</option>
<option value="Qatar">🇶🇦 Qatar</option>
</select>

</div>

<div class="form-group">

<label>Date of Birth *</label>

<div style="display:flex;gap:10px;">

<select id="birthDay" required>

<option value="">Day</option>

</select>

<select id="birthMonth" required>

<option value="">Month</option>

<option value="01">January</option>
<option value="02">February</option>
<option value="03">March</option>
<option value="04">April</option>
<option value="05">May</option>
<option value="06">June</option>
<option value="07">July</option>
<option value="08">August</option>
<option value="09">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>

</select>

<select id="birthYear" required>

<option value="">Year</option>

</select>

</div>

</div>

  </div>
  <div class="row">

<div class="form-group">
<label>Gender *</label>

<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

</div>

<div class="form-group">
<label>Occupation *</label>

<input
type="text"
id="occupation"
placeholder="Your Occupation"
required>

</div>

</div>

<div class="form-group">

<label>Current Address *</label>

<textarea
id="address"
placeholder="Enter your full address"
required></textarea>

</div>

<div class="form-group">

<label>Upload Passport Copy</label>

<input
type="file"
id="passportFile"
accept=".jpg,.jpeg,.png,.pdf">

</div>

<div class="form-group">

<label>Additional Notes</label>

<textarea
id="notes"
placeholder="Write any additional information (optional)"></textarea>

</div>

<div id="message" style="margin:20px 0;"></div>

<button type="submit">

Submit Application

  </button>
  </form>

</div>

<footer style="background:#003366;color:white;text-align:center;padding:20px;margin-top:40px;">
© 2026 Guzo Go International Travel & Visa Consultancy
</footer>

<script type="module">

import { saveApplication } from "./firebase.js";

const form = document.getElementById("applicationForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e) => {

e.preventDefault();

const data = {

fullName: document.getElementById("fullName").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value,
passport: document.getElementById("passport").value,
country: document.getElementById("country").value,
dob:
document.getElementById("birthYear").value + "-" +
document.getElementById("birthMonth").value + "-" +
document.getElementById("birthDay").value,
gender: document.getElementById("gender").value,
occupation: document.getElementById("occupation").value,
address: document.getElementById("address").value,
notes: document.getElementById("notes").value,

service: document.getElementById("service").value,
passportOption: document.getElementById("passportOption").value,
reference: "",
amount: ""
};

const result = await saveApplication(data);

if(result.success){

message.innerHTML = `
<div style="background:#d4edda;padding:25px;border-radius:10px;color:#155724;line-height:1.8;">

<h2>✅ Application Submitted Successfully!</h2>

<p><strong>Applicant ID:</strong> ${result.applicantId}</p>

<hr style="margin:15px 0;">

<p>
<strong>🇬🇧 English</strong><br><br>

Your application has been received successfully.<br>
Our verification team will review your documents within <strong>24–48 hours</strong>.<br>
Please do not make any payment at this stage.<br>
If your application is approved, you will receive an official <strong>Approval Letter</strong> together with payment instructions.
</p>

<br>

<p>
<strong>🇪🇹 አማርኛ</strong><br><br>

ማመልከቻዎ በተሳካ ሁኔታ ደርሶናል።<br>
የማረጋገጫ ቡድናችን ሰነዶችዎን በ<strong>24–48 ሰዓታት</strong> ውስጥ ይመረምራል።<br>
በዚህ ደረጃ ላይ እባክዎ ምንም ክፍያ አይፈጽሙ።<br>
ማመልከቻዎ ከጸደቀ በኋላ ኦፊሴላዊ <strong>Approval Letter</strong> ከክፍያ መመሪያዎች ጋር ይላክልዎታል።
</p>

<hr style="margin:15px 0;">

<p>
🙏 <strong>Thank you for choosing Guzo Go Travel.</strong><br>
We appreciate your patience and will contact you as soon as the review process is complete.
</p>

<p>
🙏 <strong>Guzo Go Travelን ስለመረጡ እናመሰግናለን።</strong><br>
ለትዕግስትዎ እናመሰግናለን፤ የማረጋገጫ ሂደቱ እንደተጠናቀቀ ወዲያውኑ እናነጋግርዎታለን።
</p>

</div>
`;

form.reset();

}else{

message.innerHTML = `
<div style="background:#f8d7da;padding:20px;border-radius:10px;color:#721c24;">
❌ ${result.message}
</div>
`;

}

});

</script>
  <script>

const daySelect = document.getElementById("birthDay");
const yearSelect = document.getElementById("birthYear");

// Days
for(let i=1;i<=31;i++){

let day=i.toString().padStart(2,"0");

daySelect.innerHTML += `<option value="${day}">${i}</option>`;

}

// Years (2026 → 1950)
for(let y=2026;y>=1950;y--){

yearSelect.innerHTML += `<option value="${y}">${y}</option>`;

}

  </script>
  <script>
function setLanguage(lang){

if(lang==="am"){

document.querySelector(".hero h2").innerText="የቪዛ ማመልከቻ";
document.querySelector(".hero p").innerText="እባክዎ ቅጹን በጥንቃቄ ይሙሉ።";
document.querySelector(".container h2").innerText="የማመልከቻ ቅጽ";

}

else{

document.querySelector(".hero h2").innerText="Online Visa Application";
document.querySelector(".hero p").innerText="Complete the form below carefully. Your application will be reviewed by our team.";
document.querySelector(".container h2").innerText="Application Form";

}

}
  </script>
</body>

  </html>
