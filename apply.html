</head>

<body>

<header class="header">

<div class="container">

<div class="logo">

<h1>🌍 Guzo Go International</h1>

<p>Travel & Visa Consultancy</p>

</div>

<nav>

</div>

</header>

<section class="hero">

<div class="hero-content">

<h1>Online Visa Application</h1>

<p>

Complete the form below carefully.

Your information will be reviewed by our Visa Officers.

</p>

</div>

</section>

<section class="application">

<div class="container">

<h2>Applicant Information</h2>

<form id="applicationForm">

<div class="row">

<div class="input-box">

<label>Full Name</label>

<input
id="fullName"
type="text"
required>

</div>

<div class="input-box">

<label>Email Address</label>

<input
id="email"
type="email"
required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Phone Number</label>

<input
id="phone"
type="tel"
required>

</div>

<div class="input-box">

<label>Date of Birth</label>

<input
id="dob"
type="date"
required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Gender</label>

<select id="gender" required>

<option value="">Select</option>

<option>Male</option>

<option>Female</option>

</select>

</div>

<div class="input-box">

<label>Nationality</label>

<input
id="nationality"
type="text"
required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Passport Number</label>

<input
id="passport"
type="text"
required>

</div>

<div class="input-box">

<label>Country Applying For</label>

<select id="country" required>

<option value="">Choose Country</option>

<option>Canada</option>

<option>Saudi Arabia</option>

<option>Kuwait</option>

<option>Dubai (UAE)</option>

</select>

</div>

  </div>
<div class="row">

<div class="input-box">

<label>Visa Type</label>

<select id="visaType" required>

<option value="">Select Visa Type</option>

<option>Work Visa</option>

<option>Visit Visa</option>

<option>Student Visa</option>

<option>Business Visa</option>

</select>

</div>

<div class="input-box">

<label>Marital Status</label>

<select id="maritalStatus" required>

<option value="">Select Status</option>

<option>Single</option>

<option>Married</option>

<option>Divorced</option>

<option>Widowed</option>

</select>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Current Occupation</label>

<input
id="occupation"
type="text"
placeholder="Your Occupation"
required>

</div>

<div class="input-box">

<label>Current Address</label>

<input
id="address"
type="text"
placeholder="City, Sub City, Country"
required>

</div>

</div>

<h2>Upload Required Documents</h2>

<div class="row">

<div class="input-box">

<label>Passport Photo</label>

<input
id="passportPhoto"
type="file"
accept="image/*"
required>

</div>

<div class="input-box">

<label>Passport Scan</label>

<input
id="passportScan"
type="file"
accept=".pdf,.jpg,.jpeg,.png"
required>

</div>

</div>

<div class="row">

<div class="input-box">

<label>Curriculum Vitae (CV)</label>

<input
id="cvFile"
type="file"
accept=".pdf,.doc,.docx"
required>

</div>

<div class="input-box">

<label>Educational Certificate</label>

<input
id="educationFile"
type="file"
accept=".pdf,.jpg,.jpeg,.png">

</div>

</div>

<div class="row">

<div class="input-box">

<label>Work Experience Certificate</label>

<input
id="experienceFile"
type="file"
accept=".pdf,.jpg,.jpeg,.png">

</div>

<div class="input-box">

<label>Medical Certificate</label>

<input
id="medicalFile"
type="file"
accept=".pdf,.jpg,.jpeg,.png">

</div>

</div>

<div class="row">

<div class="input-box">

<label>Police Clearance Certificate</label>

<input
id="policeFile"
type="file"
accept=".pdf,.jpg,.jpeg,.png">

</div>

<div class="input-box">

<label>National ID (Optional)</label>

<input
id="nationalId"
type="file"
accept=".pdf,.jpg,.jpeg,.png">

</div>

  </div>
